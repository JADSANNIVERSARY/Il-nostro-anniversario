<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon Anniversario!</title>
    <style>
        /* Sfondo verde chiaro e allineamento centrale */
        body {
            background-color: #d4edda;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Stile del Countdown */
        #countdown {
            font-size: 28px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }

        h2 {
            color: #e74c3c;
            font-size: 26px;
            margin-bottom: 30px;
        }

        /* Pulsante iniziale (Grigio) */
        .btn {
            font-size: 18px;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            background-color: #7f8c8d;
            color: white;
        }

        /* Pulsante quando diventa attivo (Verde) */
        .btn.attivo {
            background-color: #2ecc71;
        }

        /* Schermate nascoste di default */
        .hidden {
            display: none;
        }

        /* Schermata finale dell'anniversario */
        .foto-coppia {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .testo-finale {
            font-size: 24px;
            color: #d35400;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- SCHERMATA PRINCIPALE -->
    <div id="schermata-principale" class="container">
        <h1>14 LUGLIO 2025 - 14 LUGLIO 2026</h1>
        
        <!-- Timer del conto alla rovescia -->
        <div id="countdown">Caricamento countdown...</div>
        
        <h2>Buon Anniversario Amore Mio ❤️‍🔥</h2>
        
        <!-- Pulsante dinamico -->
        <button id="bottone-speciale" class="btn" onclick="gestisciClick()">clicca qui</button>
    </div>

    <!-- SCHERMATA ERRORE (Prima del 14 Luglio) -->
    <div id="schermata-errore" class="container hidden">
        <h2 style="color: #c0392b;">Non è possibile procedere alla tua richiesta, non fare il furbo!</h2>
        <button class="btn" style="background-color: #34495e;" onclick="tornaIndietro()">Torna indietro</button>
    </div>

    <!-- SCHERMATA SORPRESA (Dal 14 Luglio in poi) -->
    <div id="schermata-sorpresa" class="container hidden">
        <!-- SOSTITUISCI IL NOME DEL FILE QUI SOTTO CON LA VOSTRA FOTO -->
        <img src="INSERISCI_QUI_IL_NOME_DELLA_FOTO.jpg" alt="Noi Insieme" class="foto-coppia">
        
        <h1 style="color: #27ae60; margin-top: 20px;">+ 1 anno insieme</h1>
        <div class="testo-finale">Ti Amo Amore Mio per sempre</div>
    </div>

    <script>
        // Imposta la data del vostro anniversario (14 Luglio 2026)
        const dataAnniversario = new Date("July 14, 2026 00:00:00").getTime();
        let sbloccato = false;

        function aggiornaPagina() {
            const oraAttuale = new Date().getTime();
            const distanza = dataAnniversario - oraAttuale;

            const bottone = document.getElementById("bottone-speciale");
            const countdownElement = document.getElementById("countdown");

            // Se la data è passata o è oggi (14 Luglio 2026)
            if (distanza <= 0) {
                sbloccato = true;
                countdownElement.innerHTML = "È IL NOSTRO GIORNO! 🎉";
                bottone.classList.add("attivo"); // Diventa verde
            } else {
                sbloccato = false;
                bottone.classList.remove("attivo"); // Resta grigio
                
                // Calcolo del tempo per il countdown visivo
                const giorni = Math.floor(distanza / (1000 * 60 * 60 * 24));
                const ore = Math.floor((distanza % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minuti = Math.floor((distanza % (1000 * 60 * 60)) / (1000 * 60));
                const secondi = Math.floor((distanza % (1000 * 60)) / 1000);

                countdownElement.innerHTML = giorni + "g " + ore + "o " + minuti + "m " + secondi + "s ";
            }
        }

        // Gestione del click sul pulsante
        function gestisciClick() {
            document.getElementById("schermata-principale").classList.add("hidden");
            
            if (sbloccato) {
                // Se è il 14 Luglio apre la sorpresa
                document.getElementById("schermata-sorpresa").classList.remove("hidden");
            } else {
                // Se non è ancora la data mostra il messaggio d'errore
                document.getElementById("schermata-errore").classList.remove("hidden");
            }
        }

        // Funzione per permettere di riprovare se si riceve l'errore
        function tornaIndietro() {
            document.getElementById("schermata-errore").classList.add("hidden");
            document.getElementById("schermata-principale").classList.remove("hidden");
        }

        // Aggiorna il countdown ogni secondo
        setInterval(aggiornaPagina, 1000);
        // Esegui subito al caricamento della pagina
        aggiornaPagina();
    </script>
</body>
</html>
